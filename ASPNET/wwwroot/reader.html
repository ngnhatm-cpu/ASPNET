<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đọc Truyện | MangaShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ffb3b1",
                "surface": "#000000",
              },
              fontFamily: {
                "headline": ["Epilogue"],
                "body": ["Be Vietnam Pro"]
              }
            }
          }
        }
    </script>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #000000; color: #ffffff; overflow-x: hidden; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        
        /* Reader specific styles */
        .page-img { 
            width: 100%; max-width: 800px; display: block; margin: 0 auto; 
            min-height: 300px; background: #0A0A0F;
        }
        
        /* Hide scrollbar for immersive reading */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff535b; }

        .toolbar-transition { transition: transform 0.3s ease-in-out; }
        .toolbar-hidden-top { transform: translateY(-100%); }
    </style>
</head>
<body class="bg-surface text-white">

<!-- Fixed Top Toolbar -->
<header id="readerToolbar" class="fixed top-0 w-full z-50 bg-[#0A0A0F]/90 backdrop-blur-md border-b border-white/10 toolbar-transition">
    <div class="max-w-screen-xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="goBack()" class="w-10 h-10 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 id="chapterTitle" class="font-bold text-lg leading-tight line-clamp-1">Đang tải...</h1>
        </div>
        <div class="flex items-center gap-6">
            <div id="navAuthArea" class="flex items-center">
                <!-- Auth area populated by app.js -->
            </div>
            <button class="w-10 h-10 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </div>
    </div>
</header>

<main class="w-full min-h-screen pt-20 pb-24 flex flex-col" id="readerContainer">
    <div id="loader" class="flex-grow flex items-center justify-center">
        <div class="text-white/40 flex flex-col items-center gap-4">
            <span class="material-symbols-outlined animate-spin text-4xl">sync</span>
            <p class="font-bold tracking-widest uppercase text-xs">Đang tải ảnh...</p>
        </div>
    </div>

    <!-- Images will be inserted here -->
    <div id="pagesContainer" class="w-full"></div>

    <!-- Error Fallback -->
    <div id="errorContainer" class="hidden flex-grow flex items-center justify-center p-8">
        <div class="text-center max-w-sm">
            <span class="material-symbols-outlined text-6xl text-red-500 mb-4">error</span>
            <h2 class="text-xl font-bold mb-2 uppercase tracking-tighter">Thông báo</h2>
            <p id="errorMsg" class="text-white/40 text-sm font-medium leading-loose mb-6">Đã có lỗi xảy ra khi tải nội dung chương này.</p>
            <button onclick="goBack()" class="bg-white/10 hover:bg-white/20 font-bold py-3 px-8 rounded uppercase tracking-widest transition-colors text-xs">Quay Lại</button>
        </div>
    </div>

    <!-- Comment Section -->
    <div class="w-full max-w-screen-md mx-auto px-6 py-20 mt-12 border-t border-white/5">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-xl font-black font-headline uppercase tracking-tighter text-white">Bình luận chương</h3>
            <span id="commentCount" class="text-[10px] font-bold text-white/40 uppercase tracking-widest">0 bình luận</span>
        </div>

        <div id="commentForm" class="mb-12 hidden">
            <textarea id="commentInput" placeholder="Để lại cảm nghĩ của bạn..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-primary transition-all min-h-[100px] mb-4"></textarea>
            <div class="flex justify-end">
                <button onclick="submitComment()" class="bg-primary text-on-primary-container font-black px-6 py-2.5 rounded uppercase tracking-widest text-[10px] hover:scale-105 transition-all shadow-lg shadow-primary/20">Gửi bình luận</button>
            </div>
        </div>
        
        <div id="commentLoginPrompt" class="mb-12 py-8 bg-white/5 border border-dashed border-white/10 rounded-xl text-center">
            <p class="text-xs text-white/40 font-medium mb-4">Vui lòng đăng nhập để tham gia thảo luận</p>
            <a href="login.html" class="text-primary font-bold text-xs uppercase tracking-widest hover:underline">Đăng nhập ngay</a>
        </div>

        <div id="commentsList" class="space-y-6">
            <!-- Comments loaded via interactions.js -->
        </div>
    </div>
</main>

<!-- Bottom Nav -->
<footer class="w-full py-12 flex justify-center items-center gap-6" id="bottomNav">
    <button id="btnPrev" onclick="navigateToChapter(globalPrevId)" class="flex items-center gap-2 text-white/30 hover:text-white transition-colors font-bold uppercase tracking-widest text-xs disabled:opacity-20 disabled:pointer-events-none">
        <span class="material-symbols-outlined">chevron_left</span> Chương Lùi
    </button>
    <button id="btnNext" onclick="navigateToChapter(globalNextId)" class="flex items-center gap-2 bg-[#ff535b] hover:bg-white text-white hover:text-[#5b000e] transition-colors py-4 px-8 rounded-full font-black uppercase tracking-widest text-sm shadow-xl hover:shadow-[#ff535b]/30 disabled:opacity-20 disabled:pointer-events-none">
        Chương Tới <span class="material-symbols-outlined">chevron_right</span>
    </button>
</footer>

<!-- Reader Paywall Modal -->
<div id="paywallModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-6 opacity-0 transition-opacity duration-300">
    <div class="p-10 rounded-2xl max-w-md w-full text-center border border-primary/20 bg-[#131318]/90 shadow-2xl shadow-primary/20 scale-95 transform transition-transform duration-300" id="paywallContent">
        <span class="material-symbols-outlined text-6xl text-primary mb-6">lock</span>
        <h2 class="text-2xl font-black font-headline uppercase tracking-tighter text-white mb-2">Chương Trả Phí</h2>
        <p class="text-sm text-white/60 mb-6 font-medium">Bạn cần mở khóa chương này để tiếp tục hành trình.</p>
        
        <div class="bg-white/5 p-6 rounded-xl border border-white/5 mb-8">
            <div class="flex justify-between items-center mb-4 text-xs font-bold uppercase tracking-widest text-white/40">
                <span>Phí mở khóa</span>
                <span id="modalPrice" class="text-lg text-primary">0 Xu</span>
            </div>
            <div class="flex justify-between items-center text-xs font-bold uppercase tracking-widest text-white/40 border-t border-white/5 pt-4">
                <span>Số dư hiện tại</span>
                <span id="modalBalance" class="text-secondary-fixed">0 Xu</span>
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="goBack()" class="flex-1 py-4 bg-white/5 hover:bg-white/10 text-white font-bold uppercase tracking-widest rounded transition-colors text-xs">Quay Lại</button>
            <button id="btnConfirmBuy" onclick="buyChapterInReader()" class="flex-1 py-4 bg-primary hover:bg-white text-on-primary-container font-black uppercase tracking-widest rounded transition-all text-xs shadow-lg hover:shadow-primary/30">Mở Khóa Ngay</button>
        </div>
        <p id="modalError" class="text-red-500 text-xs font-bold mt-4 hidden"></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/interactions.js"></script>
<script src="js/reader.js"></script>
</body>
</html>
