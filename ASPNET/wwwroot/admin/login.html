<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin | MangaStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #0e0e13; }
        h1 { font-family: 'Epilogue', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    select option { background-color: #1f1f25; color: #ffffff; }
    
      .hero-gradient { background: radial-gradient(circle at top right, rgba(255, 83, 91, 0.15) 0%, transparent 60%); }
      @keyframes embers-rise {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        20% { opacity: 0.6; }
        100% { transform: translateY(-300px) scale(0.5); opacity: 0; }
      }
      .ember { animation: embers-rise linear infinite; pointer-events: none; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<!-- Ambient Background Effects -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="hero-gradient absolute inset-0"></div>
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: repeating-linear-gradient(45deg, white, white 1px, transparent 1px, transparent 40px);"></div>
    <div class="ember absolute w-1 h-1 bg-[#ffb3b1] rounded-full" style="bottom: 10%; left: 20%; animation-duration: 4s; animation-delay: 0.5s;"></div>
    <div class="ember absolute w-1 h-1 bg-red-400 rounded-full" style="bottom: 5%; left: 40%; animation-duration: 5s; animation-delay: 1.2s;"></div>
    <div class="ember absolute w-1 h-1 bg-orange-400 rounded-full" style="bottom: 15%; left: 60%; animation-duration: 3s; animation-delay: 0.2s;"></div>
    <div class="ember absolute w-1 h-1 bg-[#ffb3b1] rounded-full" style="bottom: 8%; left: 80%; animation-duration: 6s; animation-delay: 2s;"></div>
    <div class="ember absolute w-1.5 h-1.5 bg-red-500 rounded-full" style="bottom: 12%; left: 35%; animation-duration: 4.5s; animation-delay: 1.8s;"></div>
</div>

    <div class="glass w-full max-w-md p-10 rounded-2xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-[#ff535b]/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-[#6fd8cc]/10 rounded-full blur-3xl"></div>

        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-[#ff535b] italic tracking-tighter mb-2">MangaShop</h1>
            <p class="text-white/40 text-sm uppercase tracking-widest font-bold">Admin Panel Access</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-white/60 uppercase tracking-widest mb-2">Username</label>
                <input type="text" id="username" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#ff535b] transition-all"
                    placeholder="admin">
            </div>
            <div>
                <label class="block text-xs font-bold text-white/60 uppercase tracking-widest mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#ff535b] transition-all"
                    placeholder="••••••••">
            </div>
            
            <button type="submit" 
                class="w-full bg-gradient-to-r from-[#ff535b] to-[#92001c] text-white font-bold py-4 rounded-lg uppercase tracking-widest hover:brightness-110 transition-all shadow-lg shadow-[#ff535b]/20">
                Sign In
            </button>
            <p id="errorMsg" class="text-red-500 text-sm text-center hidden"></p>
        </form>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
