<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Quản lý Đơn Hàng | MangaStore Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #0e0e13; color: #ffffff; }
        h1, h2, h3, .font-headline { font-family: 'Epilogue', sans-serif; }
    select option { background-color: #1f1f25; color: #ffffff; }
    
      .hero-gradient { background: radial-gradient(circle at top right, rgba(255, 83, 91, 0.15) 0%, transparent 60%); }
      @keyframes embers-rise {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        20% { opacity: 0.6; }
        100% { transform: translateY(-300px) scale(0.5); opacity: 0; }
      }
      .ember { animation: embers-rise linear infinite; pointer-events: none; }
</style>
</head>
<body class="text-white">

<!-- Ambient Background Effects -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="hero-gradient absolute inset-0"></div>
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: repeating-linear-gradient(45deg, white, white 1px, transparent 1px, transparent 40px);"></div>
    <div class="ember absolute w-1 h-1 bg-[#ffb3b1] rounded-full" style="bottom: 10%; left: 20%; animation-duration: 4s; animation-delay: 0.5s;"></div>
    <div class="ember absolute w-1 h-1 bg-red-400 rounded-full" style="bottom: 5%; left: 40%; animation-duration: 5s; animation-delay: 1.2s;"></div>
    <div class="ember absolute w-1 h-1 bg-orange-400 rounded-full" style="bottom: 15%; left: 60%; animation-duration: 3s; animation-delay: 0.2s;"></div>
    <div class="ember absolute w-1 h-1 bg-[#ffb3b1] rounded-full" style="bottom: 8%; left: 80%; animation-duration: 6s; animation-delay: 2s;"></div>
    <div class="ember absolute w-1.5 h-1.5 bg-red-500 rounded-full" style="bottom: 12%; left: 35%; animation-duration: 4.5s; animation-delay: 1.8s;"></div>
</div>

<aside class="fixed left-0 top-0 h-full w-64 bg-[#0e0e13] border-r border-white/5 flex flex-col py-8 z-50">
    <div class="px-8 mb-12">
        <h1 class="text-2xl font-black italic tracking-tighter text-[#ff535b] font-headline">MangaShop</h1>
    </div>
    <nav class="flex-1 space-y-1">
        <a class="flex items-center gap-4 text-white/40 px-6 py-4 font-headline font-bold text-sm tracking-widest uppercase hover:bg-white/5 hover:text-white transition-all" href="index.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span>Dashboard</span>
        </a>
        <a class="flex items-center gap-4 text-white/40 px-6 py-4 font-headline font-bold text-sm tracking-widest uppercase hover:bg-white/5 hover:text-white transition-all" href="categories.html">
            <span class="material-symbols-outlined">category</span>
            <span>Categories</span>
        </a>
        <a class="flex items-center gap-4 text-white/40 px-6 py-4 font-headline font-bold text-sm tracking-widest uppercase hover:bg-white/5 hover:text-white transition-all" href="mangas.html">
            <span class="material-symbols-outlined">library_books</span>
            <span>Manga & Chapters</span>
        </a>
        <a class="flex items-center gap-4 text-[#ff535b] border-r-4 border-[#ff535b] bg-white/5 px-6 py-4 font-headline font-bold text-sm tracking-widest uppercase" href="orders.html">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span>Orders</span>
        </a>
        <a class="flex items-center gap-4 text-white/40 px-6 py-4 font-headline font-bold text-sm tracking-widest uppercase hover:bg-white/5 hover:text-white transition-all" href="users.html">
            <span class="material-symbols-outlined">group</span>
            <span>Users & Wallet</span>
        </a>
    </nav>
</aside>

<header class="fixed top-0 right-0 left-64 h-16 bg-[#131318]/60 backdrop-blur-xl border-b border-white/5 flex justify-between items-center px-8 z-40">
    <h2 class="text-white font-headline font-bold uppercase tracking-widest text-sm">Giao dịch hệ thống</h2>
</header>

<main class="relative z-10 ml-64 mt-16 p-8 min-h-screen">
    <div class="bg-[#1b1b20] w-full rounded-xl border border-white/5 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-white/5 text-white/40 text-[10px] uppercase font-bold tracking-widest">
                <tr>
                    <th class="px-6 py-4">Mã ĐH</th>
                    <th class="px-6 py-4">Khách Hàng</th>
                    <th class="px-6 py-4">Ngày Mua</th>
                    <th class="px-6 py-4">Tổng Xu</th>
                    <th class="px-6 py-4">Trạng thái</th>
                    <th class="px-6 py-4 text-right">Chi tiết</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody" class="text-sm">
            </tbody>
        </table>
    </div>
</main>

<!-- Order Details Modal -->
<div id="orderModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
    <div class="bg-[#1f1f25] w-full max-w-2xl rounded-2xl border border-white/10 p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h3 id="modalTitle" class="text-2xl font-black text-white font-headline uppercase tracking-tighter">Chi tiết Đơn Hàng #<span id="orderIdLabel"></span></h3>
            <button onclick="closeOrderModal()" class="text-white/40 hover:text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        
        <div class="mb-4 text-sm text-white/60">
            <p>Khách hàng: <strong class="text-white" id="orderCustomer"></strong></p>
            <p>Ngày: <strong class="text-white" id="orderDate"></strong></p>
            <p>Tổng thanh toán: <strong class="text-[#ff535b]" id="orderTotal"></strong></p>
        </div>

        <div class="border border-white/5 rounded-lg overflow-hidden max-h-60 overflow-y-auto mb-6">
            <table class="w-full text-left text-sm">
                <thead class="bg-white/5 text-white/40 text-[10px] uppercase">
                    <tr>
                        <th class="px-4 py-2">Truyện</th>
                        <th class="px-4 py-2">Chương</th>
                        <th class="px-4 py-2 text-right">Giá</th>
                    </tr>
                </thead>
                <tbody id="orderItemsBody">
                </tbody>
            </table>
        </div>

        <div class="flex justify-end">
            <button onclick="closeOrderModal()" class="bg-white/5 text-white/60 font-bold py-3 px-8 rounded-lg uppercase tracking-widest hover:bg-white/10 transition-all">Đóng</button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/admin_orders.js"></script>
</body>
</html>
